services:
  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://goblin:${POSTGRES_PASSWORD:-password}@db:5432/smart_goblin
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: smart_goblin
      POSTGRES_USER: goblin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goblin -d smart_goblin"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
